    <script>
        // ==========================================
        // Google Authentication Logic
        // ==========================================
        const CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: handleCredentialResponse
            });
            
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "filled_black", size: "large", shape: "pill", width: "250" } 
            );
            
            loadHighScore();
        };

        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            const responsePayload = decodeJwtResponse(response.credential);

            document.getElementById('user-name').textContent = responsePayload.name;
            document.getElementById('user-email').textContent = responsePayload.email;
            document.getElementById('user-pic').src = responsePayload.picture;

            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            document.getElementById('game-section').classList.add('flex');

            resetGame();
        }

        function signOut() {
            document.getElementById('game-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('flex');
            document.getElementById('login-section').classList.remove('hidden');
            clearTimeout(gameLoopTimeout);
        }

        // ==========================================
        // Snake Game Logic & Premium Rendering
        // ==========================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');

        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = 0;
        let gameLoopTimeout;
        let changingDirection = false;
        let isGameOver = false;

        const gridSize = 20; 
        const tileCount = canvas.width / gridSize;

        function loadHighScore() {
            highScore = localStorage.getItem('snakePremiumHighScore') || 0;
            highScoreDisplay.textContent = highScore;
        }

        function saveHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakePremiumHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }
        }

        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            score = 0;
            scoreDisplay.textContent = score;
            isGameOver = false;
            
            gameOverScreen.classList.add('hidden');
            gameOverScreen.classList.remove('flex');
            
            spawnFood();
            clearTimeout(gameLoopTimeout);
            main();
        }

        function main() {
            if (hasGameEnded()) {
                isGameOver = true;
                finalScoreDisplay.textContent = score;
                saveHighScore();
                gameOverScreen.classList.remove('hidden');
                gameOverScreen.classList.add('flex');
                return;
            }

            changingDirection = false;
            gameLoopTimeout = setTimeout(function onTick() {
                clearCanvas();
                drawGrid();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100); 
        }

        function clearCanvas() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for(let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
        }

        // Rounded Rectangle Polyfill for Canvas
        CanvasRenderingContext2D.prototype.roundRect = CanvasRenderingContext2D.prototype.roundRect || function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.beginPath();
            this.moveTo(x+r, y);
            this.arcTo(x+w, y,   x+w, y+h, r);
            this.arcTo(x+w, y+h, x,   y+h, r);
            this.arcTo(x,   y+h, x,   y,   r);
            this.arcTo(x,   y,   x+w, y,   r);
            this.closePath();
            return this;
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                
                // Add Glow Effect
                ctx.shadowBlur = isHead ? 15 : 8;
                ctx.shadowColor = '#4ade80';
                
                ctx.fillStyle = isHead ? '#4ade80' : '#22c55e';
                
                // Draw rounded segments
                ctx.roundRect(
                    part.x * gridSize + 2, 
                    part.y * gridSize + 2, 
                    gridSize - 4, 
                    gridSize - 4, 
                    isHead ? 6 : 4
                );
                ctx.fill();
                
                // Reset shadow for next drawings
                ctx.shadowBlur = 0;
            });
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); 

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = score;
                // Add pop animation class to score
                scoreDisplay.classList.remove('scale-100');
                scoreDisplay.classList.add('scale-125');
                setTimeout(() => {
                    scoreDisplay.classList.remove('scale-125');
                    scoreDisplay.classList.add('scale-100');
                }, 150);

                spawnFood();
            } else {
                snake.pop(); 
            }
        }

        function drawFood() {
            ctx.fillStyle = '#f87171'; 
            
            // Neon Glow for food
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#f87171';

            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2, 
                food.y * gridSize + gridSize/2, 
                gridSize/2 - 3, 
                0, 2 * Math.PI
            );
            ctx.fill();
            
            ctx.shadowBlur = 0; // Reset
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x === food.x && part.y === food.y) spawnFood();
            });
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        function changeDirection(event) {
            if (changingDirection || isGameOver) return;
            
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;
            const W_KEY = 87;
            const A_KEY = 65;
            const S_KEY = 83;
            const D_KEY = 68;

            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === LEFT_KEY || keyPressed === A_KEY) && !goingRight) {
                dx = -1; dy = 0; changingDirection = true;
            }
            if ((keyPressed === UP_KEY || keyPressed === W_KEY) && !goingDown) {
                dx = 0; dy = -1; changingDirection = true;
            }
            if ((keyPressed === RIGHT_KEY || keyPressed === D_KEY) && !goingLeft) {
                dx = 1; dy = 0; changingDirection = true;
            }
            if ((keyPressed === DOWN_KEY || keyPressed === S_KEY) && !goingUp) {
                dx = 0; dy = 1; changingDirection = true;
            }
        }

        document.addEventListener("keydown", changeDirection);
        window.addEventListener("keydown", function(e) {
            if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }
        }, false);
    </script>
</body>
</html>
